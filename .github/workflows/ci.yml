name: CI Python

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: pytest



        
